services:
  milvus:
    image: milvusdb/milvus:v2.5.14
    container_name: milvus-standalone

    command:
      - milvus
      - run
      - standalone

    restart: unless-stopped

    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local

    ports:
      - "19530:19530"
      - "9091:9091"

    volumes:
      - milvus_data:/var/lib/milvus

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:9091/healthz"
        ]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s

    networks:
      - vista-network

volumes:
  milvus_data:

networks:
  vista-network:
    external: true